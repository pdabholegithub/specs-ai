name: SyncFlow Autonomous Self-Healing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        id: playwright-run
        run: npx playwright test --screenshot=only-on-failure > test-output.log 2>&1
        continue-on-error: true

      - name: Check for Failures & Heal
        if: steps.playwright-run.outcome == 'failure'
        env:
          FAILURE_LOGS: ${{ hashFiles('test-output.log') && 'See test-output.log' || 'Test run failed.' }}
          SYNCFLOW_API_URL: ${{ secrets.SYNCFLOW_API_URL }}
          SPECS_ACCESS_CODE: ${{ secrets.SPECS_ACCESS_CODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Test run failed. Initializing SyncFlow Secure Self-Healing..."
          
          # 1. Capture logs
          export FAILURE_LOGS=$(cat test-output.log | tail -n 100)
          
          # 2. Run Healing Script
          node scripts/heal-ci.js
          
          # 3. Pre-Flight Verification: Re-run tests to verify the fix
          echo "🔄 Verifying the fix with a second test run..."
          if npx playwright test; then
            echo "✅ Fix verified! Tests passed after AI healing."
            
            # 4. Create the Secure PR
            if [ -f "diagnosis.md" ]; then
              BRANCH_NAME="syncflow/fix-$(date +%Y%m%d-%H%M%S)"
              
              git config --global user.name 'SyncFlow Bot'
              git config --global user.email 'bot@syncflow.ai'
              
              git checkout -b $BRANCH_NAME
              git add .
              git commit -m "fix(syncflow): verified autonomous patch for CI failure"
              git push origin $BRANCH_NAME
              
              gh pr create \
                --title "🛡️ SyncFlow: Verified Fix for CI Failure" \
                --body-file diagnosis.md \
                --base main \
                --head $BRANCH_NAME \
                --draft \
                --label "ai-healed"
                
              echo "🚀 Verified Draft PR created on branch $BRANCH_NAME"
            fi
          else
            echo "❌ AI fix failed verification. No PR created."
            exit 1
          fi

      - name: Report Final Status
        if: always()
        run: |
          if [ "${{ steps.playwright-run.outcome }}" == "success" ]; then
            echo "✅ Tests passed!"
          else
            echo "⚠️ CI Failed. SyncFlow Secure PR flow triggered."
          fi
